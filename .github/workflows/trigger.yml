name: Notify site to rebuild

# When notes change here, tell the site repo to rebuild & publish the garden.
on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger leahtu.github.io deploy
        env:
          TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SITE_DISPATCH_TOKEN secret is not set yet — skipping instant trigger."
            echo "(The site also rebuilds on a schedule, so notes will still publish.)"
            exit 0
          fi
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/leahtu/leahtu.github.io/dispatches \
            -d '{"event_type":"notes-updated"}'
          echo "Triggered site rebuild."
